syntax = "proto3";

import "google/protobuf/empty.proto";

package LLM;

service LLM {
  rpc get_info(google.protobuf.Empty) returns (GetInfoResponse);

  rpc get_stats(google.protobuf.Empty) returns (GetStatusResponse);

  rpc get_kv_agent_metadata(google.protobuf.Empty) returns (KVAgentMetadata);

  rpc add_remote_kv_agent(KVAgentMetadata) returns (google.protobuf.Empty);

  rpc generate(GenerateRequest) returns (GenerateResponse);

  rpc reserve(ReserveRequest)  returns (ReserveResponse);

  rpc transfer_kv(TransferKVRequest)  returns (TransferKVResponse);

  rpc trigger(TriggerRequest)  returns (GenerateResponse);

  rpc clear_cache(google.protobuf.Empty) returns (google.protobuf.Empty);
}

message GetInfoResponse {
  string id = 1;
  string kind = 2;
}

message EngineStats {
  uint64 num_running_reqs = 1;
  uint64 num_allocated_reqs = 2;
  uint64 num_waiting_reqs = 3;
  uint64 num_pendding_reqs = 4;
  float gpu_kv_block_usage = 5;
  float host_kv_block_usage = 6;
}

message GetStatusResponse {
  EngineStats engine_stats = 1;
}

message GenerateRequest {
  string session_id = 1;
  repeated uint32 input_ids = 2;
  uint32 num_samples = 3;
  optional uint64 max_output_len = 4;
  bool ignore_eos = 5;
}

message GenerateResponse {
  string session_id = 1;
  repeated uint32 output_ids = 2;
  repeated float token_latencies = 3;
}

message ReserveRequest {
  string session_id = 1;
  repeated uint32 input_ids = 2;
  uint32 num_samples = 3;
  optional uint64 max_output_len = 4;
  bool ignore_eos = 5;
}

message ReserveResponse {
  repeated bytes kv_descs = 1;
  repeated uint64 hash_values = 2;
}

message TransferKVRequest {
  string session_id = 1;
  repeated string peer_names = 2;
  repeated bytes kv_descs = 3;
  repeated uint64 hash_values = 4;
}

message TransferKVResponse {
  repeated uint64 success_hashes = 1;
}

message TriggerRequest {
  string session_id = 1;
  repeated uint64 hash_values = 2;
}

message AgentMetadata {
  string agent_name = 1;
  bytes data = 2;
}

message KVAgentMetadata {
  repeated AgentMetadata agents = 1;
}
