syntax = "proto3";

package LLM;

service LLM {
  rpc generate(GenerateRequest) returns (GenerateResponse);
}

message GenerateRequest {
  string session_id = 1;
  repeated uint32 input_ids = 2;
  uint32 num_samples = 3;
  optional uint64 max_output_len = 4;
  bool ignore_eos = 5;
}

message GenerateResponse {
  string session_id = 1;
  repeated uint32 output_ids = 2;
}
